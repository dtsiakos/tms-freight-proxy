<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Univex Freight — Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 14px; color: #888; margin-top: 2px; }
  .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-primary { background: #0099D6; color: #fff; }
  .btn-primary:hover { background: #0077AA; }
  .btn-danger { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-secondary { background: #f0f4f8; color: #555; border: 1px solid #ddd; }
  .btn-secondary:hover { background: #e5e9ed; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .search { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; width: 220px; }
  .search:focus { outline: none; border-color: #0099D6; }
  .stats { font-size: 13px; color: #888; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #e5e5e5; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  tr:hover td { background: #f9fbff; }
  td input, td select { padding: 4px 7px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; font-family: inherit; width: 100%; min-width: 60px; }
  td input:focus, td select:focus { outline: none; border-color: #0099D6; }
  td input[type="checkbox"] { width: auto; min-width: unset; }
  .model-cell { font-weight: 600; color: #1a1a1a; min-width: 90px; }
  .actions { display: flex; gap: 5px; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-ltl { background: #e8f6fd; color: #0077AA; }
  .badge-ups { background: #fef9e8; color: #92600a; }
  .badge-both { background: #f0fdf4; color: #166534; }
  .incomplete { color: #bbb; font-style: italic; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.75rem; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 1.25rem; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select { padding: 8px 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; font-family: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: #0099D6; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .ups-section { background: #fef9e8; border: 1px solid #fde68a; border-radius: 8px; padding: 12px; margin-top: 8px; display: none; }
  .ups-section.show { display: block; }
  .ups-section-title { font-size: 11px; font-weight: 600; color: #92600a; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .notice { font-size: 12px; color: #999; padding: 8px 12px; background: #fafafa; border-radius: 8px; border-left: 3px solid #e5e5e5; margin-top: 1rem; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 2000; display: none; }
  .toast.show { display: block; }
  .loading { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
  .sign-out { font-size: 12px; color: #888; cursor: pointer; padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; background: #f0f4f8; }
  .sign-out:hover { background: #e5e9ed; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Equipment Admin</h1>
      <p>Manage weights, dimensions and carrier settings for all models</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="userLabel" style="font-size:12px;color:#888;"></span>
      <button class="sign-out" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add model</button>
      <input class="search" type="text" placeholder="Search models..." oninput="filterTable(this.value)" />
      <div class="stats" id="statsLabel"></div>
    </div>
    <div id="tableContainer"><div class="loading">Loading equipment data...</div></div>
  </div>

  <div class="notice">Changes take effect immediately — no redeploy needed. All rates will use the updated specs on the next quote request.</div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add model</h2>
    <input type="hidden" id="editId" />
    <div class="field">
      <label>Model number</label>
      <input type="text" id="fModel" placeholder="e.g. SRM60+" />
    </div>
    <div class="field">
      <label>Carrier type</label>
      <select id="fCarrier" onchange="toggleUpsSection()">
        <option value="ltl">LTL only</option>
        <option value="ups">UPS parcel only</option>
        <option value="both">Both LTL and UPS</option>
      </select>
    </div>
    <div class="field"><label>Weight (lbs)</label><input type="number" id="fWeight" placeholder="e.g. 220" /></div>
    <div class="grid3">
      <div class="field"><label>Length (in)</label><input type="number" id="fL" placeholder="L" /></div>
      <div class="field"><label>Width (in)</label><input type="number" id="fW" placeholder="W" /></div>
      <div class="field"><label>Height (in)</label><input type="number" id="fH" placeholder="H" /></div>
    </div>
    <div class="field" style="flex-direction:row;align-items:center;gap:8px;margin-top:4px;">
      <input type="checkbox" id="fLiftgate" style="width:auto;" />
      <label style="text-transform:none;font-size:13px;color:#333;letter-spacing:0;" for="fLiftgate">Liftgate available</label>
    </div>
    <div class="ups-section" id="upsSection">
      <div class="ups-section-title">UPS parcel specs (if different from LTL)</div>
      <div class="field"><label>UPS weight (lbs)</label><input type="number" id="fUpsWeight" placeholder="Leave blank to use main weight" /></div>
      <div class="grid3">
        <div class="field"><label>UPS Length</label><input type="number" id="fUpsL" placeholder="L" /></div>
        <div class="field"><label>UPS Width</label><input type="number" id="fUpsW" placeholder="W" /></div>
        <div class="field"><label>UPS Height</label><input type="number" id="fUpsH" placeholder="H" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModel()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Auth check
const token = sessionStorage.getItem('freightToken');
const username = sessionStorage.getItem('freightUser');
if (!token) window.location.href = '/';
document.getElementById('userLabel').textContent = username || '';

function authHeaders(extra) {
  return Object.assign({ 'Content-Type': 'application/json', 'x-session-token': token }, extra || {});
}

let allEquipment = [];

async function loadEquipment() {
  try {
    const res = await fetch('/api/equipment', { headers: authHeaders() });
    if (res.status === 401) { window.location.href = '/'; return; }
    if (res.status === 503) {
      document.getElementById('tableContainer').innerHTML = '<div class="loading">Database not yet configured — please set up PostgreSQL on Render first.</div>';
      return;
    }
    allEquipment = await res.json();
    
    // If empty, seed from hardcoded data
    if (allEquipment.length === 0) {
      await seedDatabase();
      const res2 = await fetch('/api/equipment', { headers: authHeaders() });
      allEquipment = await res2.json();
    }
    
    renderTable(allEquipment);
  } catch(e) {
    document.getElementById('tableContainer').innerHTML = '<div class="loading">Error loading data: ' + e.message + '</div>';
  }
}

async function seedDatabase() {
  // Seed from the hardcoded EQ data embedded in index.html — fetch it
  try {
    showToast('Initializing database with equipment data...');
    const res = await fetch('/api/equipment/seed', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ items: SEED_DATA })
    });
    const d = await res.json();
    showToast('Database initialized with ' + d.seeded + ' models');
  } catch(e) {
    console.error('Seed error:', e);
  }
}

function renderTable(items) {
  const complete = items.filter(i => i.weight && i.dim_l).length;
  document.getElementById('statsLabel').textContent = items.length + ' models · ' + complete + ' with specs · ' + (items.length - complete) + ' pending';

  if (!items.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="loading">No models found.</div>';
    return;
  }

  const rows = items.map(item => {
    const hasDims = item.weight && item.dim_l;
    const dims = hasDims ? `${item.dim_l}×${item.dim_w}×${item.dim_h}"` : '<span class="incomplete">—</span>';
    const weight = item.weight ? item.weight + ' lbs' : '<span class="incomplete">—</span>';
    const liftgate = item.liftgate ? '✓' : '—';
    const carrierBadge = `<span class="badge badge-${item.carrier}">${item.carrier.toUpperCase()}</span>`;
    return `<tr>
      <td class="model-cell">${item.model}</td>
      <td>${weight}</td>
      <td>${dims}</td>
      <td style="text-align:center;">${liftgate}</td>
      <td>${carrierBadge}</td>
      <td><div class="actions">
        <button class="btn btn-secondary btn-sm" onclick="openEditModal(${item.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteModel(${item.id}, '${item.model}')">Delete</button>
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead><tr>
        <th>Model</th><th>Weight</th><th>Dimensions (L×W×H)</th>
        <th style="text-align:center;">Liftgate</th><th>Carrier</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterTable(q) {
  const filtered = q ? allEquipment.filter(i => i.model.toLowerCase().includes(q.toLowerCase())) : allEquipment;
  renderTable(filtered);
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Add model';
  document.getElementById('editId').value = '';
  document.getElementById('fModel').value = '';
  document.getElementById('fCarrier').value = 'ltl';
  document.getElementById('fWeight').value = '';
  document.getElementById('fL').value = '';
  document.getElementById('fW').value = '';
  document.getElementById('fH').value = '';
  document.getElementById('fLiftgate').checked = false;
  document.getElementById('fUpsWeight').value = '';
  document.getElementById('fUpsL').value = '';
  document.getElementById('fUpsW').value = '';
  document.getElementById('fUpsH').value = '';
  toggleUpsSection();
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('fModel').focus();
}

function openEditModal(id) {
  const item = allEquipment.find(i => i.id === id);
  if (!item) return;
  document.getElementById('modalTitle').textContent = 'Edit ' + item.model;
  document.getElementById('editId').value = id;
  document.getElementById('fModel').value = item.model;
  document.getElementById('fCarrier').value = item.carrier || 'ltl';
  document.getElementById('fWeight').value = item.weight || '';
  document.getElementById('fL').value = item.dim_l || '';
  document.getElementById('fW').value = item.dim_w || '';
  document.getElementById('fH').value = item.dim_h || '';
  document.getElementById('fLiftgate').checked = !!item.liftgate;
  document.getElementById('fUpsWeight').value = item.ups_weight || '';
  document.getElementById('fUpsL').value = item.ups_dim_l || '';
  document.getElementById('fUpsW').value = item.ups_dim_w || '';
  document.getElementById('fUpsH').value = item.ups_dim_h || '';
  toggleUpsSection();
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function toggleUpsSection() {
  const carrier = document.getElementById('fCarrier').value;
  document.getElementById('upsSection').classList.toggle('show', carrier === 'both');
}

async function saveModel() {
  const id = document.getElementById('editId').value;
  const data = {
    model: document.getElementById('fModel').value.trim(),
    carrier: document.getElementById('fCarrier').value,
    weight: document.getElementById('fWeight').value || null,
    dim_l: document.getElementById('fL').value || null,
    dim_w: document.getElementById('fW').value || null,
    dim_h: document.getElementById('fH').value || null,
    liftgate: document.getElementById('fLiftgate').checked,
    ups_weight: document.getElementById('fUpsWeight').value || null,
    ups_dim_l: document.getElementById('fUpsL').value || null,
    ups_dim_w: document.getElementById('fUpsW').value || null,
    ups_dim_h: document.getElementById('fUpsH').value || null,
  };
  if (!data.model) { alert('Model number is required'); return; }
  try {
    const url = id ? '/api/equipment/' + id : '/api/equipment';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(data) });
    if (!res.ok) { const e = await res.json(); alert('Error: ' + e.error); return; }
    closeModal();
    showToast(id ? 'Model updated' : 'Model added');
    await loadEquipment();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function deleteModel(id, model) {
  if (!confirm('Delete ' + model + '? This cannot be undone.')) return;
  try {
    const res = await fetch('/api/equipment/' + id, { method: 'DELETE', headers: authHeaders() });
    if (!res.ok) { const e = await res.json(); alert('Error: ' + e.error); return; }
    showToast(model + ' deleted');
    await loadEquipment();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function doLogout() {
  await fetch('/auth/logout', { method: 'POST', headers: authHeaders() });
  sessionStorage.removeItem('freightToken');
  sessionStorage.removeItem('freightUser');
  window.location.href = '/';
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

</script>

</html>
