<title>Univex Freight Tool — Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { display: block; height: 48px; margin: 0 auto 1.5rem; }
  h1 { font-size: 20px; font-weight: 600; text-align: center; color: #1a1a1a; margin-bottom: 6px; }
  p { font-size: 14px; color: #888; text-align: center; margin-bottom: 1.75rem; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  input { padding: 10px 13px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit; transition: border-color 0.15s; }
  input:focus { outline: none; border-color: #0099D6; box-shadow: 0 0 0 3px rgba(0,153,214,0.12); }
  .btn { width: 100%; padding: 12px; background: #0099D6; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 6px; transition: background 0.15s; }
  .btn:hover { background: #0077AA; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .error { font-size: 13px; color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 12px; margin-top: 12px; display: none; text-align: center; }
  .footer { font-size: 11px; color: #bbb; text-align: center; margin-top: 1.5rem; }
</style>

  <h1>Freight Quote Tool</h1>
  <p>Sign in to access carrier rates</p>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autocapitalize="none" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign in</button>
  <div class="error" id="errBox">Invalid username or password. Please try again.</div>
  <div class="footer">For access issues contact your administrator</div>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errBox');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  err.style.display = 'none';
  if (!username || !password) { err.textContent = 'Please enter your username and password.'; err.style.display = 'block'; return; }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      const data = await res.json();
      sessionStorage.setItem('freightToken', data.token);
      sessionStorage.setItem('freightUser', data.username);
      window.location.href = '/tool';
    } else {
      err.textContent = 'Invalid username or password. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
